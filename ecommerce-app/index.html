<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Elevate E-Commerce</title>
    <meta name="description" content="Login to your Elevate E-Commerce account to access premium shopping experiences.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="login-container">
        <div class="glass-panel">
            <div class="brand-header">
                <div class="logo-circle">
                    <i class="ph ph-shopping-bag-open"></i>
                </div>
                <h1>Elevate</h1>
                <p>Welcome back, trendsetter.</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="ph ph-envelope-simple icon"></i>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock-key icon"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Keep me logged in
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Sign In</span>
                    <i class="ph ph-arrow-right btn-icon"></i>
                    <div class="spinner hide"></div>
                </button>
            </form>

            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-buttons">
                    <button class="social-btn" aria-label="Login with Google">
                        <i class="ph ph-google-logo"></i>
                    </button>
                    <button class="social-btn" aria-label="Login with Apple">
                        <i class="ph ph-apple-logo"></i>
                    </button>
                </div>
            </div>

            <p class="signup-prompt">
                Don't have an account? <a href="#">Create one now</a>
            </p>
        </div>
    </main>

    <script src="toast.js"></script>
    <script src="script.js"></script>
</body>
</html>
